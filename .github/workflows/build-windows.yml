name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pyinstaller
        pip install flet>=0.28.3
        pip install argon2-cffi>=23.1.0
        pip install cryptography>=42.0.0
        echo "=== Installed packages ==="
        pip list
        echo "=== PyInstaller location ==="
        where pyinstaller
        python -c "import PyInstaller; print('PyInstaller version:', PyInstaller.__version__)"
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "KrabbFileCrypt" krabb-filecrypt-safe.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: KrabbFileCrypt-Windows
        path: dist/KrabbFileCrypt.exe
        retention-days: 30
    
    - name: Upload build logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: |
          *.spec
          build/
        retention-days: 7
