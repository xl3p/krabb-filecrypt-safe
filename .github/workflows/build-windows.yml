name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build with PyInstaller
      run: |
        python -m PyInstaller --onefile --windowed --name "KrabbFileCrypt" krabb-filecrypt-safe.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: KrabbFileCrypt-Windows
        path: dist/KrabbFileCrypt.exe
        retention-days: 30
